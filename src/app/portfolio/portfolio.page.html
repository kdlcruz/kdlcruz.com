<ion-content padding>
  <ion-grid>
    <ion-row>
      <ion-col size-lg="3" size-md="3" size-sm="12" size-xs="12">
        <app-portfolio-side></app-portfolio-side>
      </ion-col>
      <ion-col class="main" size-lg="9" size-md="9" size-sm="12" size-xs="12">
        <ion-grid class="main-grid">
          <ion-row *ngFor="let portfolio of portfolioData" padding>
            <ion-col size-lg="6" size-md="6" size-sm="12" size-xs="12">
              <a href="{{ portfolio.link }}">
                <img src="assets/images/{{ portfolio.img }}">
              </a>
            </ion-col>
            <ion-col size-lg="6" size-md="6" size-sm="12" size-xs="12">
              <b>{{ portfolio.name }}</b>
              <br><br>
              <ion-item-group>
                <ion-chip *ngFor="let tag of portfolio.tags">
                  <ion-label>{{ tag }}</ion-label>
                </ion-chip>
              </ion-item-group>
              <br>
              <ion-text>{{ portfolio.description }}</ion-text>
            </ion-col>
          </ion-row>
        </ion-grid>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
